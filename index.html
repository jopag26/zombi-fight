<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Zombi Fight</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }

    #hud {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #health-bar-bg {
      position: absolute; bottom: 30px; left: 30px;
      width: 220px; height: 22px;
      background: #111; border: 2px solid #555; border-radius: 4px;
    }
    #health-bar {
      height: 100%; width: 100%;
      background: linear-gradient(90deg, #c00, #f44);
      border-radius: 3px; transition: width 0.2s;
    }
    #health-label {
      position: absolute; bottom: 56px; left: 30px;
      color: #f44; font-size: 13px; letter-spacing: 1px;
    }
    #ammo {
      position: absolute; bottom: 30px; right: 30px;
      color: #ff0; font-size: 22px; letter-spacing: 2px;
    }
    #score {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
      color: #fff; font-size: 20px; letter-spacing: 3px;
    }
    #wave {
      position: absolute; top: 55px; left: 50%; transform: translateX(-50%);
      color: #f80; font-size: 14px; letter-spacing: 2px;
    }
    #crosshair {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 24px; height: 24px;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute; background: rgba(255,255,255,0.85);
    }
    #crosshair::before { width: 2px; height: 100%; left: 50%; transform: translateX(-50%); }
    #crosshair::after  { width: 100%; height: 2px; top: 50%; transform: translateY(-50%); }

    #flash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #f80; opacity: 0; pointer-events: none; z-index: 20;
      transition: opacity 0.05s;
    }
    #damage-flash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #f00; opacity: 0; pointer-events: none; z-index: 19;
      transition: opacity 0.1s;
    }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 30;
      color: #fff;
    }
    #overlay h1 { font-size: 56px; color: #f44; text-shadow: 0 0 20px #f00; margin-bottom: 10px; }
    #overlay .sub { font-size: 16px; color: #aaa; margin-bottom: 40px; }
    #overlay .controls { font-size: 14px; color: #888; line-height: 2; margin-bottom: 40px; text-align: center; }
    #overlay button {
      padding: 14px 50px; font-size: 20px; background: #c00;
      color: #fff; border: none; border-radius: 6px; cursor: pointer;
      letter-spacing: 2px; transition: background 0.2s;
    }
    #overlay button:hover { background: #f00; }

    #gameover {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); display: none; flex-direction: column;
      align-items: center; justify-content: center; z-index: 30; color: #fff;
    }
    #gameover h1 { font-size: 64px; color: #f00; text-shadow: 0 0 30px #f00; }
    #gameover .final { font-size: 24px; margin: 20px 0 40px; color: #aaa; }
    #gameover button {
      padding: 14px 50px; font-size: 20px; background: #c00;
      color: #fff; border: none; border-radius: 6px; cursor: pointer;
      letter-spacing: 2px;
    }
    #gameover button:hover { background: #f00; }

    #wave-announce {
      position: fixed; top: 35%; left: 50%; transform: translateX(-50%);
      color: #f80; font-size: 40px; letter-spacing: 4px;
      text-shadow: 0 0 20px #f80; opacity: 0;
      pointer-events: none; z-index: 25;
      transition: opacity 0.5s;
    }
  </style>
</head>
<body>

<div id="overlay">
  <h1>ZOMBI FIGHT</h1>
  <div class="sub">Überlebe so lange du kannst</div>
  <div class="controls">
    W A S D — Bewegen<br>
    MAUS — Umsehen<br>
    LEERTASTE — Schießen<br>
    SHIFT — Rennen
  </div>
  <button id="start-btn">SPIELEN</button>
</div>

<div id="gameover">
  <h1>TOT</h1>
  <div class="final" id="final-score"></div>
  <button id="restart-btn">NOCHMAL</button>
</div>

<div id="hud">
  <div id="health-label">LEBEN</div>
  <div id="health-bar-bg"><div id="health-bar"></div></div>
  <div id="ammo">∞ MUNITION</div>
  <div id="score">PUNKTE: 0</div>
  <div id="wave">WELLE 1</div>
  <div id="crosshair"></div>
</div>

<div id="flash"></div>
<div id="damage-flash"></div>
<div id="wave-announce"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ── Szene, Kamera, Renderer ──────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a0f);
scene.fog = new THREE.Fog(0x0a0a0f, 20, 80);

const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 200);
camera.position.set(0, 1.7, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Licht ────────────────────────────────────────────────────────────────────
const ambient = new THREE.AmbientLight(0x223344, 0.6);
scene.add(ambient);

const moonLight = new THREE.DirectionalLight(0x8899cc, 0.8);
moonLight.position.set(20, 40, 10);
moonLight.castShadow = true;
moonLight.shadow.mapSize.set(2048, 2048);
moonLight.shadow.camera.near = 0.5;
moonLight.shadow.camera.far = 150;
moonLight.shadow.camera.left = -60;
moonLight.shadow.camera.right = 60;
moonLight.shadow.camera.top = 60;
moonLight.shadow.camera.bottom = -60;
scene.add(moonLight);

// Rote Notlichter
[-15, 15].forEach(x => {
  const pl = new THREE.PointLight(0xff2200, 1.5, 25);
  pl.position.set(x, 3, 0);
  scene.add(pl);
});

// ── Boden ────────────────────────────────────────────────────────────────────
const groundGeo = new THREE.PlaneGeometry(120, 120, 30, 30);
const groundMat = new THREE.MeshLambertMaterial({ color: 0x1a1a10 });
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Gitterlinien auf dem Boden
const gridHelper = new THREE.GridHelper(120, 40, 0x222200, 0x111100);
gridHelper.position.y = 0.01;
scene.add(gridHelper);

// ── Umgebungs-Gebäude / Wände ────────────────────────────────────────────────
function makeBuilding(x, z, w, d, h, color) {
  const geo = new THREE.BoxGeometry(w, h, d);
  const mat = new THREE.MeshLambertMaterial({ color });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(x, h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

const buildings = [];
const buildingData = [
  [20, 10, 8, 6, 12, 0x1a1a2e],  [−20, −15, 6, 10, 16, 0x16213e],
  [−18, 12, 10, 5, 10, 0x0f3460], [25, −20, 7, 8, 14, 0x1a1a2e],
  [−30, 0, 5, 12, 8, 0x16213e],   [10, 25, 9, 6, 18, 0x1a1a2e],
  [−10, −28, 6, 7, 12, 0x0f3460], [35, 5, 8, 9, 10, 0x16213e],
  [−35, −10, 7, 6, 14, 0x1a1a2e],[0, 35, 10, 5, 9, 0x16213e],
];
buildingData.forEach(d => buildings.push(makeBuilding(...d)));

// Begrenzungsmauern
[[0, 55, 120, 2, 6], [0, -55, 120, 2, 6],
 [55, 0, 2, 120, 6], [-55, 0, 2, 120, 6]].forEach(([x, z, w, d, h]) => {
  makeBuilding(x, z, w, d, h, 0x111111);
});

// ── Waffe (First-Person-Ansicht) ─────────────────────────────────────────────
const gunGroup = new THREE.Group();
camera.add(gunGroup);
scene.add(camera);

// Pistolenkörper
const gunBody = new THREE.Mesh(
  new THREE.BoxGeometry(0.08, 0.13, 0.35),
  new THREE.MeshLambertMaterial({ color: 0x222222 })
);
gunBody.position.set(0.25, -0.22, -0.45);
gunGroup.add(gunBody);

// Lauf
const barrel = new THREE.Mesh(
  new THREE.CylinderGeometry(0.018, 0.018, 0.28, 8),
  new THREE.MeshLambertMaterial({ color: 0x111111 })
);
barrel.rotation.x = Math.PI / 2;
barrel.position.set(0.25, -0.18, -0.68);
gunGroup.add(barrel);

// Griff
const grip = new THREE.Mesh(
  new THREE.BoxGeometry(0.07, 0.15, 0.09),
  new THREE.MeshLambertMaterial({ color: 0x3a2a1a })
);
grip.position.set(0.25, -0.33, -0.38);
grip.rotation.x = 0.15;
gunGroup.add(grip);

// Visier
const sight = new THREE.Mesh(
  new THREE.BoxGeometry(0.025, 0.025, 0.025),
  new THREE.MeshLambertMaterial({ color: 0xff3300 })
);
sight.position.set(0.25, -0.155, -0.57);
gunGroup.add(sight);

// ── Spieler-Zustand ──────────────────────────────────────────────────────────
const player = {
  health: 100,
  score: 0,
  wave: 1,
  alive: true,
  shootCooldown: 0,
  recoil: 0,
  bobTime: 0,
  speed: 6,
  sprintMult: 1,
};

// ── Eingabe ──────────────────────────────────────────────────────────────────
const keys = {};
let yaw = 0, pitch = 0;
let shooting = false;
let gameStarted = false;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') { e.preventDefault(); shooting = true; }
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') player.sprintMult = 1.8;
});
document.addEventListener('keyup', e => {
  keys[e.code] = false;
  if (e.code === 'Space') shooting = false;
  if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') player.sprintMult = 1;
});

document.addEventListener('mousemove', e => {
  if (!gameStarted || !player.alive) return;
  yaw   -= e.movementX * 0.002;
  pitch -= e.movementY * 0.002;
  pitch = Math.max(-Math.PI / 3, Math.min(Math.PI / 3, pitch));
});

document.addEventListener('click', e => {
  if (gameStarted && player.alive) {
    renderer.domElement.requestPointerLock();
  }
});

// ── Zombi-System ─────────────────────────────────────────────────────────────
const zombies = [];
const ZOMBIE_COLORS = [0x2d5a1b, 0x1b3d0f, 0x4a7c2f, 0x3d6b1a];

function createZombie(x, z) {
  const group = new THREE.Group();

  // Körper
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.7, 1.1, 0.4),
    new THREE.MeshLambertMaterial({ color: ZOMBIE_COLORS[Math.floor(Math.random() * 4)] })
  );
  body.position.y = 0.95;
  body.castShadow = true;
  group.add(body);

  // Kopf
  const head = new THREE.Mesh(
    new THREE.BoxGeometry(0.5, 0.5, 0.5),
    new THREE.MeshLambertMaterial({ color: 0x3d6b1a })
  );
  head.position.y = 1.75;
  head.castShadow = true;
  group.add(head);

  // Augen (rot leuchtend)
  [-0.12, 0.12].forEach(ox => {
    const eye = new THREE.Mesh(
      new THREE.SphereGeometry(0.07, 6, 6),
      new THREE.MeshBasicMaterial({ color: 0xff0000 })
    );
    eye.position.set(ox, 1.78, 0.26);
    group.add(eye);
  });

  // Arme
  [-0.5, 0.5].forEach(ox => {
    const arm = new THREE.Mesh(
      new THREE.BoxGeometry(0.22, 0.85, 0.22),
      new THREE.MeshLambertMaterial({ color: 0x2d5a1b })
    );
    arm.position.set(ox, 1.0, 0);
    group.add(arm);
  });

  // Beine
  [-0.2, 0.2].forEach(ox => {
    const leg = new THREE.Mesh(
      new THREE.BoxGeometry(0.25, 0.8, 0.25),
      new THREE.MeshLambertMaterial({ color: 0x1a2a0a })
    );
    leg.position.set(ox, 0.4, 0);
    group.add(leg);
  });

  group.position.set(x, 0, z);
  scene.add(group);

  return {
    mesh: group,
    health: 100,
    speed: 1.5 + Math.random() * 1.0,
    attackCooldown: 0,
    walkPhase: Math.random() * Math.PI * 2,
    dead: false,
    dyingTime: 0,
  };
}

function spawnWave(wave) {
  const count = 5 + wave * 3;
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const dist  = 35 + Math.random() * 20;
    const x = Math.cos(angle) * dist;
    const z = Math.sin(angle) * dist;
    zombies.push(createZombie(x, z));
  }
}

// ── Partikel / Schuss-Effekte ────────────────────────────────────────────────
const particles = [];

function spawnBlood(pos) {
  for (let i = 0; i < 8; i++) {
    const geo = new THREE.SphereGeometry(0.06 + Math.random() * 0.08, 4, 4);
    const mat = new THREE.MeshBasicMaterial({ color: 0xaa0000 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.copy(pos);
    scene.add(mesh);
    particles.push({
      mesh,
      vel: new THREE.Vector3(
        (Math.random() - 0.5) * 5,
        Math.random() * 4,
        (Math.random() - 0.5) * 5
      ),
      life: 0.6 + Math.random() * 0.4,
      maxLife: 1,
      type: 'blood',
    });
  }
}

function spawnMuzzleFlash() {
  const geo = new THREE.SphereGeometry(0.08, 6, 6);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffaa00 });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);
  const worldPos = new THREE.Vector3();
  barrel.getWorldPosition(worldPos);
  mesh.position.copy(worldPos);
  particles.push({ mesh, vel: new THREE.Vector3(), life: 0.07, maxLife: 0.07, type: 'flash' });
}

function spawnBulletTrail(from, to) {
  const dir = to.clone().sub(from);
  const len = dir.length();
  const geo = new THREE.CylinderGeometry(0.015, 0.015, len, 4);
  const mat = new THREE.MeshBasicMaterial({ color: 0xffee88, transparent: true, opacity: 0.7 });
  const mesh = new THREE.Mesh(geo, mat);
  const mid = from.clone().add(to).multiplyScalar(0.5);
  mesh.position.copy(mid);
  mesh.quaternion.setFromUnitVectors(
    new THREE.Vector3(0, 1, 0),
    dir.clone().normalize()
  );
  scene.add(mesh);
  particles.push({ mesh, vel: new THREE.Vector3(), life: 0.12, maxLife: 0.12, type: 'trail' });
}

// ── Raycasting für Schuss ────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();

function shoot() {
  if (!player.alive || player.shootCooldown > 0) return;
  player.shootCooldown = 0.22;
  player.recoil = 1;

  // Mündungsblitz
  spawnMuzzleFlash();

  // Bildschirmblitz
  const fl = document.getElementById('flash');
  fl.style.opacity = '0.35';
  setTimeout(() => fl.style.opacity = '0', 80);

  // Schuss-Richtung: Kamera-Mitte
  raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

  // Prüfe ob Zombi getroffen
  const zombieMeshes = zombies.filter(z => !z.dead).map(z => z.mesh);
  const intersects = raycaster.intersectObjects(zombieMeshes, true);

  const muzzlePos = new THREE.Vector3();
  barrel.getWorldPosition(muzzlePos);

  if (intersects.length > 0) {
    const hit = intersects[0];
    let zombieObj = zombies.find(z => z.mesh === hit.object || z.mesh === hit.object.parent);
    if (zombieObj && !zombieObj.dead) {
      zombieObj.health -= 34 + Math.floor(Math.random() * 20);
      spawnBlood(hit.point);
      spawnBulletTrail(muzzlePos, hit.point);
      if (zombieObj.health <= 0) {
        killZombie(zombieObj);
      }
    }
  } else {
    // Schuss ins Leere
    const endPos = muzzlePos.clone().add(raycaster.ray.direction.clone().multiplyScalar(60));
    spawnBulletTrail(muzzlePos, endPos);
  }
}

function killZombie(z) {
  z.dead = true;
  z.dyingTime = 0;
  player.score += 10 * player.wave;
  document.getElementById('score').textContent = `PUNKTE: ${player.score}`;
}

// ── Kollisions-Hilfsfunktion ─────────────────────────────────────────────────
function checkBuildingCollision(pos) {
  const playerRadius = 0.5;
  for (const b of buildings) {
    const bx = b.position.x, bz = b.position.z;
    const hw = (b.geometry.parameters.width  / 2) + playerRadius;
    const hd = (b.geometry.parameters.depth  / 2) + playerRadius;
    if (Math.abs(pos.x - bx) < hw && Math.abs(pos.z - bz) < hd) return true;
  }
  if (Math.abs(pos.x) > 54 || Math.abs(pos.z) > 54) return true;
  return false;
}

// ── HUD Update ───────────────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('health-bar').style.width = Math.max(0, player.health) + '%';
  document.getElementById('score').textContent = `PUNKTE: ${player.score}`;
  document.getElementById('wave').textContent  = `WELLE ${player.wave}`;
}

// ── Wellen-Ankündigung ────────────────────────────────────────────────────────
function announceWave(n) {
  const el = document.getElementById('wave-announce');
  el.textContent = `WELLE ${n}`;
  el.style.opacity = '1';
  setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

// ── Haupt-Spielschleife ───────────────────────────────────────────────────────
const clock = new THREE.Clock();
let nextWaveTimer = 0;

function gameLoop() {
  requestAnimationFrame(gameLoop);
  if (!gameStarted || !player.alive) { renderer.render(scene, camera); return; }

  const dt = Math.min(clock.getDelta(), 0.05);

  // Cooldowns
  if (player.shootCooldown > 0) player.shootCooldown -= dt;
  if (player.recoil > 0) player.recoil = Math.max(0, player.recoil - dt * 8);

  // Schießen (Leertaste gehalten)
  if (shooting) shoot();

  // ── Kamera-Rotation ────────────────────────────────────────────────────────
  camera.rotation.order = 'YXZ';
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // ── Bewegung ───────────────────────────────────────────────────────────────
  const moveDir = new THREE.Vector3();
  if (keys['KeyW']) moveDir.z -= 1;
  if (keys['KeyS']) moveDir.z += 1;
  if (keys['KeyA']) moveDir.x -= 1;
  if (keys['KeyD']) moveDir.x += 1;
  moveDir.normalize();

  const moving = moveDir.length() > 0;
  if (moving) {
    moveDir.applyEuler(new THREE.Euler(0, yaw, 0));
    const speed = player.speed * player.sprintMult * dt;
    const newPos = camera.position.clone().addScaledVector(moveDir, speed);
    newPos.y = 1.7;
    if (!checkBuildingCollision(newPos)) {
      camera.position.copy(newPos);
    } else {
      // Versuche Achsen einzeln
      const nx = camera.position.clone();
      nx.x = newPos.x;
      if (!checkBuildingCollision(nx)) camera.position.x = newPos.x;
      const nz = camera.position.clone();
      nz.z = newPos.z;
      if (!checkBuildingCollision(nz)) camera.position.z = newPos.z;
    }
    player.bobTime += dt * 8 * player.sprintMult;
  }

  // Kamera-Bob
  const bob = moving ? Math.sin(player.bobTime) * 0.04 : 0;
  camera.position.y = 1.7 + bob;

  // Waffen-Rückstoß-Animation
  gunGroup.position.z = player.recoil * 0.08;
  gunGroup.rotation.x = player.recoil * 0.15;

  // ── Zombi-KI ───────────────────────────────────────────────────────────────
  const playerPos = camera.position.clone();

  for (const z of zombies) {
    if (z.dead) {
      // Sterbe-Animation: umfallen
      z.dyingTime += dt;
      z.mesh.rotation.x = Math.min(Math.PI / 2, z.dyingTime * 3);
      z.mesh.position.y = Math.max(-0.5, -z.dyingTime * 0.5);
      continue;
    }

    const zPos  = z.mesh.position;
    const diff  = playerPos.clone().sub(zPos);
    diff.y = 0;
    const dist  = diff.length();

    // Geh-Animation
    z.walkPhase += dt * z.speed * 3;
    z.mesh.children.forEach((c, i) => { if (i > 4) c.rotation.x = Math.sin(z.walkPhase + i) * 0.3; });

    // Zum Spieler schauen
    if (dist > 0.1) {
      const angle = Math.atan2(diff.x, diff.z);
      z.mesh.rotation.y = angle;
    }

    if (dist < 1.5) {
      // Angriff
      z.attackCooldown -= dt;
      if (z.attackCooldown <= 0) {
        z.attackCooldown = 1.2;
        player.health -= 12;
        updateHUD();
        const dmg = document.getElementById('damage-flash');
        dmg.style.opacity = '0.45';
        setTimeout(() => { dmg.style.opacity = '0'; }, 150);
        if (player.health <= 0) endGame();
      }
    } else if (dist < 55) {
      // Zulaufen
      const moveVec = diff.normalize().multiplyScalar(z.speed * dt);
      zPos.x += moveVec.x;
      zPos.z += moveVec.z;
    }
  }

  // ── Partikel ───────────────────────────────────────────────────────────────
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
      continue;
    }
    if (p.type === 'blood') {
      p.vel.y -= 12 * dt;
      p.mesh.position.addScaledVector(p.vel, dt);
      p.mesh.material.opacity = p.life / p.maxLife;
    }
    if (p.type === 'flash') {
      const s = p.life / p.maxLife * 2;
      p.mesh.scale.setScalar(s);
    }
    if (p.type === 'trail') {
      p.mesh.material.opacity = (p.life / p.maxLife) * 0.7;
    }
  }

  // ── Nächste Welle ──────────────────────────────────────────────────────────
  const aliveZombies = zombies.filter(z => !z.dead);
  if (aliveZombies.length === 0) {
    nextWaveTimer -= dt;
    if (nextWaveTimer <= 0) {
      player.wave++;
      nextWaveTimer = 4;
      spawnWave(player.wave);
      announceWave(player.wave);
      updateHUD();
    }
  }

  renderer.render(scene, camera);
}

// ── Spiel starten / beenden ───────────────────────────────────────────────────
function startGame() {
  player.health = 100;
  player.score  = 0;
  player.wave   = 1;
  player.alive  = true;
  player.shootCooldown = 0;
  yaw = 0; pitch = 0;

  // Zombis entfernen
  zombies.forEach(z => scene.remove(z.mesh));
  zombies.length = 0;
  particles.forEach(p => scene.remove(p.mesh));
  particles.length = 0;

  camera.position.set(0, 1.7, 0);
  camera.rotation.set(0, 0, 0);

  updateHUD();
  spawnWave(1);
  announceWave(1);
  nextWaveTimer = 99999;

  document.getElementById('overlay').style.display   = 'none';
  document.getElementById('gameover').style.display  = 'none';
  gameStarted = true;
  clock.start();
  renderer.domElement.requestPointerLock();
}

function endGame() {
  player.alive  = false;
  gameStarted   = false;
  document.exitPointerLock();
  document.getElementById('final-score').textContent =
    `Punkte: ${player.score}  |  Welle: ${player.wave}`;
  document.getElementById('gameover').style.display = 'flex';
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

gameLoop();
</script>
</body>
</html>
